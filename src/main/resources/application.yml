spring:
  application:
    name: nursery-backend
  datasource:
    # Defaults target a locally-run Postgres; Docker Compose overrides the URL
    # to use the "db" service name (see docker-compose.yml).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nursery}
    username: ${SPRING_DATASOURCE_USERNAME:nursery}
    password: ${SPRING_DATASOURCE_PASSWORD:nursery}
  flyway:
    enabled: true
  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate only validates that the entities match
      # the Flyway-created tables at startup (never mutates the schema).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        # Pin Instant -> SQL TIMESTAMP (no zone) so it matches the migration DDL.
        type:
          preferred_instant_jdbc_type: TIMESTAMP

server:
  port: 8080
