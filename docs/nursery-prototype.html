<style>

  .chip{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;padding:7px 12px;font-size:12px;margin:0 6px 6px 0}
  .chip.on{background:var(--foliage);color:#fff}.chips{display:flex;flex-wrap:wrap}

  .tl-line{width:1px;flex:1;background:var(--line);margin:2px auto;min-height:16px}

  .nav button{flex:1;background:none;border:none;padding:10px 0;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--sub)}.nav button.on{color:var(--foliage)}

  .caldots{display:flex;gap:2px;margin-top:3px}.caldot{width:5px;height:5px;border-radius:999px}
  .calweek .calcell{aspect-ratio:auto;height:74px}

<script>
function strip(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
var TODAY=strip(new Date());
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return strip(x);}
function ymd(d){var m=(d.getMonth()+1),day=d.getDate();return d.getFullYear()+"-"+(m<10?"0"+m:m)+"-"+(day<10?"0"+day:day);}
function fromYmd(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function diffDays(a,b){return Math.round((strip(a)-strip(b))/86400000);}
var TE_MONTHS=["జనవరి","ఫిబ్రవరి","మార్చి","ఏప్రిల్","మే","జూన్","జూలై","ఆగస్టు","సెప్టెంబర్","అక్టోబర్","నవంబర్","డిసెంబర్"];
var TE_M_SHORT=["జన","ఫిబ్ర","మార్చి","ఏప్రి","మే","జూన్","జూలై","ఆగ","సెప్","అక్టో","నవం","డిసెం"];
var DOW=["ఆది","సోమ","మంగళ","బుధ","గురు","శుక్ర","శని"];
function fmt(d){return d.getDate()+" "+TE_M_SHORT[d.getMonth()];}
function isDue(t,date){if(t.type==="seed"){var o=orderById(t.order);if(o&&o.seededQty>=o.qty)return false;}
  if(t.scopes&&t.scopes.length&&t.scopes.indexOf("nursery")<0){var anyOpen=false;t.scopes.forEach(function(sc){var b=batchById(sc);if(b&&!b.closed)anyOpen=true;});if(!anyOpen)return false;}
  var s=strip(t.start);if(strip(date)<s)return false;var dd=diffDays(date,s);if(t.repeat==="once")return dd===0;if(t.repeat==="daily")return true;if(t.repeat==="weekly")return dd%7===0;if(t.repeat==="everyN")return dd%(t.n||5)===0;return false;}
var CROPS=[{name:"మిర్చి (Chilli)",lead:40},{name:"టమాటా (Tomato)",lead:24},{name:"వంగ (Brinjal)",lead:35},{name:"క్యాప్సికం",lead:50},{name:"క్యాబేజీ",lead:30}];

function estTrays(q){return Math.ceil(q*1.05/98);}
function cropIdxByName(nm){for(var i=0;i<CROPS.length;i++)if(CROPS[i].name===nm)return i;return 0;}

(function(){var counts={"రవి":24,"సురేష్":18,"లక్ష్మణ్":20};S.workers.forEach(function(w){for(var d=1;d<=26;d++){var k=ymd(addDays(TODAY,-d));w.att[k]=(d<=counts[w.name])?"P":"A";}});
S.tasks[0].log[ymd(addDays(TODAY,-1))]={status:"done"};S.tasks[0].log[ymd(addDays(TODAY,-2))]={status:"done"};S.tasks[0].log[ymd(addDays(TODAY,-3))]={status:"missed",note:"వర్షం వచ్చింది"};})();

function num(n){return (typeof n==="number"?n.toLocaleString("en-IN"):n);}
function toast(m){var t=document.getElementById("toast");t.innerHTML='<div class="toast">'+m+'</div>';clearTimeout(window._tt);window._tt=setTimeout(function(){t.innerHTML="";},2400);}
function batchById(id){for(var i=0;i<S.batches.length;i++)if(S.batches[i].id===id)return S.batches[i];return null;}
function orderById(id){for(var i=0;i<S.orders.length;i++)if(S.orders[i].id===id)return S.orders[i];return null;}
function workerBy(n){for(var i=0;i<S.workers.length;i++)if(S.workers[i].name===n)return S.workers[i];return null;}
function WNAMES(){return S.workers.map(function(w){return w.name;});}
function dispatched(b){var s=0;b.timeline.forEach(function(e){if(e.type==="dispatch")s+=(e.qty||0);});return s;}
function remaining(b){return b.alive-dispatched(b);}
function openBatches(){return S.batches.filter(function(b){return !b.closed;});}
function reservedTrays(){var s=0;S.orders.forEach(function(o){if(!o.closed){var un=o.qty-o.seededQty;if(un>0)s+=estTrays(un);}});return s;}
function occTrays(b){if(b.closed)return 0;if(b.alive<=0)return 0;return Math.max(0,Math.ceil(b.traysNum*remaining(b)/b.alive));}
function occupiedTrays(){var s=0;S.batches.forEach(function(b){s+=occTrays(b);});return s;}
function usedTrays(){return reservedTrays()+occupiedTrays();}
function freeTrays(){return S.settings.trayTotal-usedTrays();}
function contractTotal(o){return o.priceMode==="tray"?estTrays(o.qty)*o.rate:o.qty*o.rate;}
function paidTotal(o){var s=0;o.payments.forEach(function(p){s+=p.amt;});return s;}
function obalance(o){return contractTotal(o)-paidTotal(o)-(o.discount||0)-(o.writeoff?o.writeoff.amt:0);}
function contractLabel(o){return o.priceMode==="tray"?estTrays(o.qty)+" ట్రేలు × ₹"+num(o.rate):num(o.qty)+" మొక్కలు × ₹"+o.rate;}

  var toggle='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="chip '+(S.calMode==="week"?"on":"")+'" style="flex:1;text-align:center" onclick="calSet(\'week\')">వారం</button><button class="chip '+(S.calMode==="month"?"on":"")+'" style="flex:1;text-align:center" onclick="calSet(\'month\')">నెల</button></div>';
  var dows=DOW.map(function(d){return '<div class="caldow">'+d+'</div>';}).join("");var days=[];
  if(S.calMode==="month"){var first=new Date(ref.getFullYear(),ref.getMonth(),1);var off=first.getDay();var dim=new Date(ref.getFullYear(),ref.getMonth()+1,0).getDate();for(var i=0;i<off;i++)days.push(null);for(var d=1;d<=dim;d++)days.push(new Date(ref.getFullYear(),ref.getMonth(),d));}
  else{var ws=new Date(ref);ws.setDate(ws.getDate()-ws.getDay());for(var i=0;i<7;i++)days.push(addDays(ws,i));}
  var cells=days.map(function(dt){if(!dt)return '<div class="calcell blank"></div>';var dstr=ymd(dt);var due=dueTasks(dstr);var isT=(dstr===ymd(TODAY));var dots="";due.slice(0,3).forEach(function(t){var st=t.log[dstr];var col=st&&st.status==="done"?"var(--seed)":(st&&st.status==="missed"?"var(--red)":"var(--amber)");dots+='<span class="caldot" style="background:'+col+'"></span>';});return '<div class="calcell'+(isT?" today":"")+'" onclick="openDay(\''+dstr+'\')"><div style="font-weight:'+(isT?"700":"400")+'">'+dt.getDate()+'</div><div class="caldots">'+dots+'</div></div>';}).join("");
  return head+toggle+'<div class="calgrid '+(S.calMode==="week"?"calweek":"")+'">'+dows+cells+'</div><div class="note" style="margin-top:14px">🟡 షెడ్యూల్ · 🟢 పూర్తి · 🔴 కాలేదు · రోజు నొక్కి పనులు+హాజరు చూడండి</div>';
}
function viewDay(dstr){
  var dt=fromYmd(dstr);var due=dueTasks(dstr);var editable=(dstr<=ymd(TODAY));
  var h='<div style="font-size:18px;font-weight:700;color:var(--ink)">'+dt.getDate()+" "+TE_MONTHS[dt.getMonth()]+'</div><div style="font-size:12px;color:var(--sub);margin-bottom:16px">'+DOW[dt.getDay()]+'వారం'+(dstr===ymd(TODAY)?" · ఈరోజు":(editable?"":" · భవిష్యత్తు"))+'</div>';
  h+='<div class="h3 first">ఆ రోజు పనులు</div>'+(due.length?due.map(function(t){return taskRow(t,dstr,editable,S.role==="owner");}).join(""):'<div style="font-size:12px;color:var(--sub)">పనులు లేవు.</div>');
  h+='<div class="h3">ఆ రోజు హాజరు</div>'+S.workers.map(function(w){var st=w.att[dstr];return '<div class="card" style="display:flex;align-items:center;gap:10px;padding:12px"><div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--ink)">'+w.name+'</div><div style="font-size:11px;color:var(--sub)">'+(w.type==="daily"?"రోజు కూలీ":"నెల జీతం")+'</div></div>'+(editable?'<button class="chip '+(st==="P"?"att-P":"")+'" style="margin:0 4px 0 0" onclick="setAtt(\''+w.name+'\',\''+dstr+'\',\'P\')">హాజరు</button><button class="chip '+(st==="A"?"att-A":"")+'" style="margin:0" onclick="setAtt(\''+w.name+'\',\''+dstr+'\',\'A\')">గైర్హాజరు</button>':'<span class="tag" style="background:'+(st==="P"?"#E8F3EC":st==="A"?"#FDECE7":"#F3F0E8")+';color:'+(st==="P"?"var(--foliage)":st==="A"?"var(--red)":"var(--sub)")+'">'+(st==="P"?"హాజరు":st==="A"?"గైర్హాజరు":"—")+'</span>')+'</div>';}).join("");
  return h;
}
function viewWorkers(){var h='<button class="btn" onclick="openScreen(\'addWorker\')">➕ కొత్త వర్కర్ చేర్చు</button><div class="h3">వర్కర్లు</div>';h+=S.workers.map(function(w){return '<button class="listbtn" onclick="openWorker(\''+w.name+'\')"><div><div class="t">'+w.name+'</div><div class="st">'+(w.type==="daily"?"రోజు ₹"+num(w.rate):"నెల ₹"+num(w.rate))+' · 📞 '+w.phone+'</div></div><div class="rt"><span class="tag" style="background:#E8F3EC;color:var(--foliage)">'+presentCount(w)+' రోజులు</span><div class="st">వివరాలు ›</div></div></button>';}).join("");return h;}
function viewAddWorker(){var w=S.nw;var typeChips=[["daily","రోజు కూలీ"],["monthly","నెల జీతం"]].map(function(x){return '<button class="chip '+(w.type===x[0]?"on":"")+'" style="flex:1" onclick="rNW(\'type\',\''+x[0]+'\')">'+x[1]+'</button>';}).join("");var joinChips=["ఈరోజు","నెల క్రితం","3 నెలల క్రితం"].map(function(x,i){return '<button class="chip '+(w.joinIdx===i?"on":"")+'" onclick="rNW(\'joinIdx\','+i+')">'+x+'</button>';}).join("");return '<div style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:16px">'+(S.nwEdit?"వర్కర్ మార్చు":"కొత్త వర్కర్")+'</div>'+(S.nwEdit?field("పేరు",'<input value="'+w.name+'" disabled style="background:#F3F0E8">'):field("పేరు",'<input value="'+w.name+'" oninput="tNW(\'name\',this.value)" placeholder="మహేష్">'))+field("ఫోన్",'<input value="'+w.phone+'" oninput="tNW(\'phone\',this.value)" placeholder="90xxxxxxxx">')+field("పే రకం",'<div class="chips" style="display:flex">'+typeChips+'</div>')+field(w.type==="daily"?"రోజు రేటు (₹)":"నెల జీతం (₹)",'<input value="'+w.rate+'" oninput="tNW(\'rate\',this.value.replace(/[^0-9]/g,\'\'))" inputmode="numeric" placeholder="'+(w.type==="daily"?"400":"12000")+'">')+(S.nwEdit?"":field("ఎప్పుడు చేరాడు",'<div class="chips">'+joinChips+'</div>'))+'<button class="btn" style="margin-top:14px" onclick="saveWorker()">'+(S.nwEdit?"మార్పులు సేవ్ చేయి":"వర్కర్ చేర్చు")+'</button>';}
function viewWorkerProfile(w){
  var h='<div style="font-size:20px;font-weight:700;color:var(--ink)">'+w.name+'</div><div style="font-size:13px;color:var(--sub);margin-bottom:14px">📞 '+w.phone+' · చేరిన తేదీ '+fmt(w.joinDate)+'</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:6px"><button class="chip" style="flex:1;text-align:center" onclick="editWorker(\''+w.name+'\')">✏️ వివరాలు మార్చు</button><button class="chip" style="flex:1;text-align:center;color:var(--red);border-color:var(--red)" onclick="deleteWorker(\''+w.name+'\')">🗑️ తీసేయి</button></div>';
  h+='<div class="card">'+rl("పే రకం",w.type==="daily"?"రోజు కూలీ ₹"+num(w.rate):"నెల జీతం ₹"+num(w.rate))+rl("హాజరు",presentCount(w)+" రోజులు")+rl("సంపాదన","₹"+num(earned(w)))+rl("అడ్వాన్స్","−₹"+num(advTotal(w)),"red")+'<div style="border-top:1px solid var(--line);margin:6px 0"></div>'+rl("ఇవ్వాల్సినది","₹"+num(netPay(w)),"bold")+'</div>';
  h+='<div class="h3">రోజువారీ చరిత్ర</div>';var rows="";
  for(var d=0;d<14;d++){var dt=addDays(TODAY,-d);var dstr=ymd(dt);var att=w.att[dstr];var myTasks=S.tasks.filter(function(t){return t.worker===w.name&&isDue(t,dt);});var taskLines="";myTasks.forEach(function(t){var st=t.log[dstr];if(st&&st.status==="done")taskLines+='<div style="font-size:12px;color:var(--foliage)">✓ '+t.title+' — '+scopesLabel(t.scopes)+'</div>';else if(st&&st.status==="missed")taskLines+='<div style="font-size:12px;color:var(--red)">✗ '+t.title+' ('+st.note+')</div>';else if(d===0)taskLines+='<div style="font-size:12px;color:var(--sub)">• '+t.title+' — పెండింగ్</div>';});if(att===undefined&&myTasks.length===0)continue;var attTag=att==="P"?'<span class="tag" style="background:#E8F3EC;color:var(--foliage)">హాజరు</span>':att==="A"?'<span class="tag" style="background:#FDECE7;color:var(--red)">గైర్హాజరు</span>':'<span class="tag" style="background:#F3F0E8;color:var(--sub)">—</span>';rows+='<div class="card" style="padding:12px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;font-weight:600;color:var(--ink)">'+fmt(dt)+(d===0?" (ఈరోజు)":"")+'</div>'+attTag+'</div>'+(taskLines?'<div style="margin-top:6px">'+taskLines+'</div>':'<div style="font-size:12px;color:var(--sub);margin-top:4px">పనులు లేవు</div>')+'</div>';}
  h+=rows;
  var acts=[];S.batches.forEach(function(b){b.timeline.forEach(function(e){if(e.by===w.name)acts.push({d:e.date,text:e.text,crop:b.crop.split(" ")[0]});});});
  if(acts.length){h+='<div class="h3">బ్యాచ్ కార్యకలాపాలు</div>'+acts.map(function(a){return '<div class="exp"><span style="color:var(--ink)">'+a.text+'<span style="color:var(--sub);font-size:11px"> · '+a.crop+'</span></span><span style="color:var(--sub);font-size:11px">'+a.d+'</span></div>';}).join("");}
  return h;
}
function viewSettings(){return '<div style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:6px">సెట్టింగ్‌లు</div><div style="font-size:12px;color:var(--sub);margin-bottom:16px">నర్సరీ మొత్తం ట్రే సామర్థ్యం</div>'+field("మొత్తం ట్రేలు",'<input value="'+S.st.trays+'" oninput="tST(this.value.replace(/[^0-9]/g,\'\'))" inputmode="numeric" placeholder="2000">')+'<div class="card" style="margin-top:10px">'+rl("ప్రస్తుతం రిజర్వ్",num(reservedTrays())+" ట్రేలు",null,true)+rl("ప్రస్తుతం వాడుకలో",num(occupiedTrays())+" ట్రేలు",null,true)+'</div><button class="btn" style="margin-top:14px" onclick="saveSettings()">సేవ్ చేయి</button>';}
function viewAddExpense(){var e=S.ef;var chips=EXP_CATS.map(function(c,i){return '<button class="chip '+(i===e.catIdx?"on":"")+'" onclick="efCat('+i+')">'+c+'</button>';}).join("");return '<div style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:16px">ఖర్చు చేర్చు</div>'+field("వర్గం",'<div class="chips">'+chips+'</div>')+field("మొత్తం (₹)",'<input value="'+e.amt+'" oninput="tEF(\'amt\',this.value.replace(/[^0-9]/g,\'\'))" inputmode="numeric" placeholder="5000">')+field("నోట్",'<input value="'+e.note+'" oninput="tEF(\'note\',this.value)" placeholder="ఐచ్ఛికం">')+'<div class="note">తేదీ: '+fmt(TODAY)+'</div><button class="btn" style="margin-top:14px" onclick="saveExpense()">ఖర్చు నమోదు</button>';}
function viewLabour(){var h='<div style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:4px">కూలీ / జీతాలు</div><div style="font-size:12px;color:var(--sub);margin-bottom:12px">హాజరు క్యాలెండర్ నుంచి వస్తుంది</div><button class="btn peat" onclick="openScreen(\'workers\')">👷 వర్కర్లు / హాజరు క్యాలెండర్</button>';h+=S.workers.map(function(w){var adv=S.advOpen===w.name;var advPanel=adv?'<div class="card" style="margin-top:8px;box-shadow:none;border:1px solid var(--line)">'+field("అడ్వాన్స్ (₹)",'<input value="'+S.advAmt+'" oninput="tADV(this.value.replace(/[^0-9]/g,\'\'))" inputmode="numeric" placeholder="2000">')+'<button class="btn peat" onclick="giveAdv(\''+w.name+'\')">అడ్వాన్స్ ఇచ్చు</button></div>':'';return '<div class="card" style="margin-top:10px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:15px;font-weight:700;color:var(--ink)">'+w.name+'</div><div style="font-size:12px;color:var(--sub)">'+(w.type==="daily"?"రోజు ₹"+num(w.rate):"నెల ₹"+num(w.rate))+'</div></div><span class="pill" style="background:'+(w.type==="daily"?"#FBEFD9":"#E8F3EC")+';color:'+(w.type==="daily"?"var(--amber)":"var(--foliage)")+'">'+(w.type==="daily"?"రోజు":"నెల")+'</span></div><div style="margin-top:10px">'+rl("హాజరు",presentCount(w)+" రోజులు")+rl(w.type==="daily"?"సంపాదన":"ఈ నెల జీతం","₹"+num(earned(w)))+rl("అడ్వాన్స్","−₹"+num(advTotal(w)),"red")+'<div style="border-top:1px solid var(--line);margin:6px 0"></div>'+rl("ఇవ్వాల్సినది","₹"+num(netPay(w)),"bold")+'</div><div style="display:flex;gap:8px;margin-top:10px"><button class="chip" style="flex:1;text-align:center;'+(adv?"background:var(--peat);color:#fff":"")+'" onclick="openAdv(\''+w.name+'\')">₹ అడ్వాన్స్</button><button class="chip" style="flex:1;text-align:center;background:var(--foliage);color:#fff" onclick="paySalary(\''+w.name+'\')">జీతం</button></div>'+advPanel+'</div>';}).join("");return h;}
function viewMoney(){
  var coll=0,dues=[];S.orders.forEach(function(o){coll+=paidTotal(o);var bl=obalance(o);if(bl>0)dues.push({o:o,bal:bl});});
  var out=0;S.expenses.forEach(function(e){out+=e.amt;});var income=coll+42000;var duesTotal=0;dues.forEach(function(d){duesTotal+=d.bal;});
  var h='<div class="profit"><div class="l">ఈ నెల లాభం</div><div class="n">₹'+num(income-out)+'</div><div class="r"><span>📈 ₹'+Math.round(income/1000)+'k</span><span>📉 ₹'+Math.round(out/1000)+'k</span></div></div>';
  h+='<div class="grid2" style="margin-top:12px"><button class="btn" onclick="openScreen(\'addExpense\')">➕ ఖర్చు చేర్చు</button><button class="btn peat" onclick="openScreen(\'labour\')">👷 కూలీ/జీతాలు</button></div>';
  h+='<div class="card" style="margin-top:12px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:600;color:var(--ink)">ఈరోజు మొత్తం ఖర్చు</span><span style="font-size:18px;font-weight:700;color:var(--red)">₹'+num(S.todayOut)+'</span></div>';
  h+='<div class="h3">రైతు బాకీలు (అన్ని ఆర్డర్లు)</div><div class="owe"><span class="k">మొత్తం వసూలు</span><span class="v">₹'+num(duesTotal)+'</span></div>';
  h+=dues.length?dues.map(function(d){return '<button class="listbtn" onclick="openOrder(\''+d.o.id+'\')"><div><div class="t" style="font-size:14px">'+d.o.farmer+' <span class="tag" style="background:'+(d.o.closed?"#EDEBE4":"#E8F3EC")+';color:'+(d.o.closed?"var(--sub)":"var(--foliage)")+'">'+(d.o.closed?"మూసిన":"open")+'</span></div><div class="st">'+d.o.crop+' · '+d.o.id+'</div></div><div style="font-weight:700;color:var(--red)">₹'+num(d.bal)+'</div></button>';}).join(""):'<div style="font-size:12px;color:var(--sub)">బాకీలు లేవు 🎉</div>';
  h+='<div class="h3">ఖర్చులు (అన్నీ)</div>'+S.expenses.map(function(e,idx){
    if(S.expEdit===idx)return '<div class="card" style="box-shadow:none;border:1px solid var(--line)">'+field(e.cat+" మార్చు (₹)",'<input value="'+S.expEditAmt+'" oninput="tExpEdit(this.value.replace(/[^0-9]/g,\'\'))" inputmode="numeric">')+'<button class="btn" onclick="saveExpEdit()">సేవ్</button></div>';
    return '<div class="exp"><span style="color:var(--ink)">'+e.cat+'<span style="color:var(--sub);font-size:11px"> · '+e.date+'</span></span><span style="color:var(--sub)">₹'+num(e.amt)+' <span onclick="openExpEdit('+idx+')" style="color:var(--blue);cursor:pointer">✏️</span></span></div>';
  }).join("");
  return h;
}
render();
</script>
